services:
  db:
    image: postgis/postgis:16-3.4
    container_name: elda_postgis
    restart: unless-stopped
    environment:
      POSTGRES_USER: elda
      POSTGRES_PASSWORD: elda
      POSTGRES_DB: elda
    ports:
      - "5432:5432"
    volumes:
      - elda_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U elda -d elda"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  elda_pgdata:
